<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(GK)²: Geographical Knowledge for Kids</title>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* BACKGROUNDS */
        #globe-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #001d3d, #000); }
        .rotating-earth { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vh; height: 80vh; background: url('https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif'); background-size: cover; border-radius: 50%; box-shadow: inset 0 0 50px #000, 0 0 40px var(--neon); opacity: 0.4; }
        #india-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; background: url('https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/1200px-Flag_of_India.svg.png') center/cover; }

        /* SCREENS */
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        #selection-menu, #main-content { display: none; }

        /* UI ELEMENTS */
        h1.title { font-size: 5rem; margin: 0; text-shadow: 0 0 20px var(--neon); }
        h1 span { font-size: 2.5rem; vertical-align: super; }
        
        .hologram-btn { margin-top: 30px; cursor: pointer; transition: 0.3s; animation: float 3s infinite ease-in-out; }
        .plane-icon { font-size: 100px; color: var(--neon); filter: drop-shadow(0 0 15px var(--neon)); }
        .btn-tag { display: block; border: 2px solid var(--neon); padding: 10px 30px; border-radius: 30px; margin-top: 15px; font-weight: bold; letter-spacing: 3px; background: rgba(0, 242, 255, 0.1); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .choice-box { display: inline-block; width: 280px; padding: 40px; margin: 15px; background: var(--glass); border: 1px solid var(--neon); border-radius: 20px; cursor: pointer; backdrop-filter: blur(10px); }
        .choice-box:hover { background: rgba(0, 242, 255, 0.2); transform: scale(1.05); }

        /* CONTENT CARDS */
        .container { max-width: 1000px; margin: 0 auto; text-align: left; padding: 40px 10px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        
        .header-flex { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .flag-img { width: 100px; height: auto; border: 1px solid #555; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-item { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px; border-left: 3px solid var(--neon); }
        .stat-item b { color: var(--neon); font-size: 0.8rem; text-transform: uppercase; display: block; }

        .map-box { width: 100%; background: #fff; border-radius: 15px; overflow: hidden; margin: 20px 0; }
        .map-box img { width: 100%; height: auto; display: block; }

        .tourist-img { width: 100%; height: 400px; object-fit: cover; border-radius: 15px; margin: 15px 0; border: 1px solid var(--neon); }
        
        select { width: 100%; padding: 15px; background: #111; color: #fff; border: 1px solid var(--neon); border-radius: 10px; font-size: 1.1rem; }
        .back-nav { cursor: pointer; color: var(--neon); margin-bottom: 20px; display: inline-block; }

        footer { text-align: center; padding: 40px; border-top: 1px solid #333; margin-top: 50px; font-size: 0.9rem; color: #888; }
        footer strong { color: var(--neon); }
    </style>
</head>
<body>

    <div id="globe-bg"><div class="rotating-earth"></div></div>
    <div id="india-bg"></div>
    <audio id="whoosh" src="https://www.soundjay.com/transportation/sounds/airplane-take-off-1.mp3"></audio>

    <!-- 1. HOME SCREEN -->
    <div id="home-screen" class="screen">
        <h1 class="title">(GK)<span>2</span></h1>
        <p style="letter-spacing: 5px; color: var(--neon);">GEOGRAPHICAL KNOWLEDGE FOR KIDS</p>
        <div class="hologram-btn" onclick="showMenu()">
            <div class="plane-icon">✈</div>
            <span class="btn-tag">ENTER</span>
        </div>
    </div>

    <!-- 2. SELECTION MENU -->
    <div id="selection-menu" class="screen">
        <h2>Select Your Explorer Mode</h2>
        <div>
            <div class="choice-box" onclick="loadContent('india')">
                <h1 style="margin:0">🇮🇳</h1>
                <h3>Incredible India</h3>
                <p>Provinces & Districts</p>
            </div>
            <div class="choice-box" onclick="loadContent('world')">
                <h1 style="margin:0">🌏</h1>
                <h3>World Nations</h3>
                <p>50+ Countries Database</p>
            </div>
        </div>
    </div>

    <!-- 3. MAIN CONTENT -->
    <div id="main-content">
        <div class="container">
            <span class="back-nav" onclick="showMenu()">← Back to Menu</span>
            <div id="selector-area"></div>
            <div id="display-area"></div>
            
            <footer>
                <p>Concept given by: <strong>Kumar Gaurav</strong></p>
                <p>Design & Developed by: <strong>100, 000 000 000</strong></p>
            </footer>
        </div>
    </div>

    <script>
        const whoosh = document.getElementById('whoosh');

        const countries = {
            india: {
                name: "India",
                capital: "New Delhi",
                continent: "Asia",
                pm: "Narendra Modi",
                president: "Droupadi Murmu",
                animal: "Bengal Tiger",
                bird: "Indian Peacock",
                flag: "https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/320px-Flag_of_India.svg.png",
                map: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/India_Location_Map.svg/800px-India_Location_Map.svg.png",
                famous: "India is world-renowned for its incredible cultural diversity, spiritual heritage, and as the largest democracy on Earth. It is famous for the majestic Himalayan mountain range, its vibrant 5,000-year-old history, and globally loved spices and cuisine. From the invention of Zero and Yoga to being a global IT superpower, India beautifully blends ancient traditions with futuristic space technology.",
                provinces: "28 States & 8 Union Territories (Maharashtra, Gujarat, Rajasthan, Kerala, etc.)",
                districts: "785+ Districts (Kutch, Thane, Leh, Pune, Ahmedabad, Lucknow, Varanasi, etc.)",
                tourist: [
                    { name: "The Taj Mahal, Agra", img: "https://images.unsplash.com/photo-1564507592333-c60657451dd7?w=1000", gist: "This stunning white marble mausoleum is one of the Seven Wonders of the World and a symbol of eternal love. Built by Emperor Shah Jahan in memory of his wife Mumtaz Mahal, it represents the pinnacle of Mughal architecture. It is famous for its perfect symmetry, intricate gemstone carvings, and the way it glows under moonlight." },
                    { name: "Jaipur (The Pink City)", img: "https://images.unsplash.com/photo-1599661046289-e31897846e41?w=1000", gist: "Jaipur is famous for its grand palaces, historic forts, and its unique pink-colored buildings that symbolize hospitality. The city features landmarks like the Hawa Mahal, which has 953 windows, and the massive Amer Fort overlooking the Maota Lake. It is a hub for traditional handicrafts, jewelry, and the rich royal culture of Rajasthan." }
                ]
            },
            usa: {
                name: "United States of America", capital: "Washington, D.C.", continent: "North America", pm: "N/A", president: "Joe Biden", animal: "American Bison", bird: "Bald Eagle",
                flag: "https://upload.wikimedia.org/wikipedia/en/thumb/a/a4/Flag_of_the_United_States.svg/320px-Flag_of_the_United_States.svg.png",
                map: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/USA_Location_Map.svg/800px-USA_Location_Map.svg.png",
                famous: "The USA is famous for being a global superpower and the birthplace of Hollywood, Silicon Valley, and Jazz music. It is known for its vast geographical wonders like the Grand Canyon and its significant influence on global technology, economics, and pop culture. The country is a melting pot of diverse cultures and is a leader in aerospace exploration and democratic ideals.",
                tourist: [{ name: "Statue of Liberty", img: "https://images.unsplash.com/photo-1605130284535-11dd9eedc58a?w=1000", gist: "Standing tall on Liberty Island, this copper statue was a gift from France and serves as a universal symbol of freedom. It has welcomed millions of immigrants to the USA and is one of the most iconic structures in human history. Visitors can explore the pedestal museum or climb to the crown for an incredible view of New York City." }]
            },
            japan: {
                name: "Japan", capital: "Tokyo", continent: "Asia", pm: "Shigeru Ishiba", president: "Emperor Naruhito", animal: "Macaque", bird: "Green Pheasant",
                flag: "https://upload.wikimedia.org/wikipedia/en/thumb/9/9e/Flag_of_Japan.svg/320px-Flag_of_Japan.svg.png",
                map: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Japan_on_the_globe_%28Japan_centered%29.svg/800px-Japan_on_the_globe_%28Japan_centered%29.svg.png",
                famous: "Japan is famous for its unique blend of ancient Samurai traditions and high-tech futuristic innovation. It is a world leader in robotics, electronics, and the automotive industry, while also being the home of Anime and Manga. The country is renowned for its disciplined culture, breathtaking cherry blossoms, and incredible food like Sushi and Ramen.",
                tourist: [{ name: "Mount Fuji", img: "https://images.unsplash.com/photo-1570690516157-a2d712740b7e?w=1000", gist: "Mount Fuji is an active stratovolcano and Japan's highest peak, serving as a sacred symbol of the nation's beauty. Its near-perfect snowy cone is a UNESCO World Heritage site and a favorite subject for artists and photographers for centuries. Thousands of people climb it every summer to witness the sunrise from the Land of the Rising Sun." }]
            },
            france: {
                name: "France", capital: "Paris", continent: "Europe", pm: "Michel Barnier", president: "Emmanuel Macron", animal: "Gallic Rooster", bird: "N/A",
                flag: "https://upload.wikimedia.org/wikipedia/en/thumb/c/c3/Flag_of_France.svg/320px-Flag_of_France.svg.png",
                map: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/France_Location_Map.svg/800px-France_Location_Map.svg.png",
                famous: "France is internationally famous as the global capital of fashion, fine arts, and high-end gastronomy. It is the most visited country in the world, known for its romantic cities, historic chateaus, and beautiful wine regions. France played a pivotal role in the Enlightenment and continues to be a major leader in European politics and culture.",
                tourist: [{ name: "The Eiffel Tower", img: "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=1000", gist: "Originally built for the 1889 World's Fair, this wrought-iron lattice tower is the definitive symbol of Paris and France. It was once the tallest man-made structure in the world and attracts millions of visitors who come to see it sparkle at night. It offers breathtaking 360-degree views of the City of Light from its three observation levels." }]
            }
        };

        // Adding 46 more countries to the list for the dropdown
        const countryList = ["Afghanistan", "Australia", "Brazil", "Canada", "China", "Germany", "Italy", "Russia", "South Africa", "United Kingdom", "Egypt", "Mexico", "Spain", "Argentina", "Netherlands", "Switzerland", "South Korea", "Saudi Arabia", "Turkey", "Indonesia", "Nigeria", "Thailand", "Vietnam", "Israel", "Norway", "Sweden", "Denmark", "Greece", "Portugal", "New Zealand", "Singapore", "Malaysia", "UAE", "Qatar", "Kenya", "Ethiopia", "Iran", "Iraq", "Pakistan", "Bangladesh", "Sri Lanka", "Nepal", "Bhutan", "Chile", "Peru", "Colombia"];

        function showMenu() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('selection-menu').style.display = 'flex';
            document.getElementById('globe-bg').style.display = 'block';
            document.getElementById('india-bg').style.display = 'none';
        }

        function loadContent(mode) {
            whoosh.play();
            document.getElementById('selection-menu').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            const selectorArea = document.getElementById('selector-area');
            const displayArea = document.getElementById('display-area');

            if(mode === 'india') {
                document.getElementById('globe-bg').style.display = 'none';
                document.getElementById('india-bg').style.display = 'block';
                selectorArea.innerHTML = "";
                renderCountry(countries.india, true);
            } else {
                document.getElementById('globe-bg').style.display = 'block';
                document.getElementById('india-bg').style.display = 'none';
                let options = `<option value="">-- Choose a Country (50 Nations) --</option>`;
                options += Object.keys(countries).filter(k => k !== 'india').map(k => `<option value="${k}">${countries[k].name}</option>`).join('');
                countryList.forEach(c => options += `<option value="generic">${c}</option>`);
                
                selectorArea.innerHTML = `<select onchange="handleWorldChange(this.value, this.options[this.selectedIndex].text)">${options}</select>`;
                displayArea.innerHTML = `<div class="card" style="text-align:center"><h3>Please select a country from the list above</h3></div>`;
            }
        }

        function handleWorldChange(val, name) {
            if(val === 'generic') {
                document.getElementById('display-area').innerHTML = `<div class="card"><h3>${name}</h3><p>Data for ${name} is being updated. Check back soon for full leadership and tourist details!</p></div>`;
            } else if(val !== "") {
                renderCountry(countries[val], false);
            }
        }

        function renderCountry(data, isIndia) {
            const displayArea = document.getElementById('display-area');
            let touristHtml = data.tourist ? data.tourist.map(t => `
                <h4>${t.name}</h4>
                <p>${t.gist}</p>
                <img src="${t.img}" class="tourist-img">
            `).join('<hr>') : "Tourist data coming soon...";

            displayArea.innerHTML = `
                <div class="card">
                    <div class="header-flex">
                        <img src="${data.flag}" class="flag-img">
                        <h1 style="margin:0">${data.name}</h1>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item"><b>Capital</b>${data.capital}</div>
                        <div class="stat-item"><b>Continent</b>${data.continent}</div>
                        <div class="stat-item"><b>Prime Minister</b>${data.pm}</div>
                        <div class="stat-item"><b>President</b>${data.president}</div>
                        <div class="stat-item"><b>National Animal</b>${data.animal}</div>
                        <div class="stat-item"><b>National Bird</b>${data.bird}</div>
                    </div>
                    <h3>World Position (Outline Map)</h3>
                    <div class="map-box"><img src="${data.map}" alt="Outline Map"></div>
                </div>

                <div class="card">
                    <h3>Famous For</h3>
                    <p style="line-height:1.6">${data.famous}</p>
                </div>

                ${isIndia ? `
                <div class="card">
                    <h3>Administrative Data</h3>
                    <p><b>States/Provinces:</b> ${data.provinces}</p>
                    <p><b>Major Districts:</b> ${data.districts}</p>
                </div>` : ''}

                <div class="card">
                    <h3>Key Tourist Destinations</h3>
                    ${touristHtml}
                </div>
            `;
        }
    </script>
</body>
</html>
