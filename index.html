<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(GK)²: Geographical Knowledge for Kids</title>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* BACKGROUNDS */
        #globe-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #001d3d, #000); }
        .earth-gif { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70vh; height: 70vh; background: url('https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif') center/cover; border-radius: 50%; box-shadow: 0 0 50px var(--neon); opacity: 0.3; }
        #india-flag-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; background: url('https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/1200px-Flag_of_India.svg.png') center/cover; }

        /* INTRO SCREEN */
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        h1.title { font-size: 5rem; margin: 0; text-shadow: 0 0 20px var(--neon); }
        h1 span { font-size: 2rem; vertical-align: super; }
        
        .hologram-btn { margin-top: 30px; cursor: pointer; transition: 0.3s; animation: hoverPlane 3s infinite ease-in-out; }
        .plane-icon { font-size: 90px; color: var(--neon); filter: drop-shadow(0 0 15px var(--neon)); transform: rotate(-45deg); }
        .btn-tag { display: block; border: 2px solid var(--neon); padding: 10px 30px; border-radius: 30px; margin-top: 15px; font-weight: bold; letter-spacing: 3px; background: rgba(0, 242, 255, 0.1); }
        @keyframes hoverPlane { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* MENU */
        #selection-menu, #main-content { display: none; }
        .choice-card { display: inline-block; width: 260px; padding: 40px; margin: 15px; background: var(--glass); border: 1px solid var(--neon); border-radius: 20px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; }
        .choice-card:hover { transform: translateY(-10px); background: rgba(0, 242, 255, 0.3); }

        /* CONTENT AREA */
        .container { max-width: 950px; margin: 0 auto; text-align: left; padding: 40px 15px; }
        .card { background: var(--glass); backdrop-filter: blur(25px); border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        
        .header-section { display: flex; align-items: center; gap: 25px; margin-bottom: 25px; }
        .flag-small { width: 120px; border: 2px solid #fff; border-radius: 5px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border-bottom: 3px solid var(--neon); }
        .stat-box small { color: var(--neon); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }

        .map-img { width: 100%; border-radius: 10px; margin: 15px 0; border: 1px solid #555; }
        .world-pos { width: 100%; max-width: 400px; border-radius: 10px; background: white; padding: 10px; }

        /* TOURIST SECTION */
        .tourist-list { display: grid; grid-template-columns: 1fr; gap: 30px; }
        .tourist-item { display: flex; gap: 20px; align-items: flex-start; }
        .tourist-item img { width: 250px; height: 180px; object-fit: cover; border-radius: 10px; border: 1px solid var(--neon); flex-shrink: 0; }
        .tourist-info h4 { margin: 0 0 10px 0; color: var(--neon); }
        .tourist-info p { margin: 0; font-size: 0.95rem; line-height: 1.5; color: #ddd; }

        select { width: 100%; padding: 15px; background: #111; color: #fff; border: 1px solid var(--neon); border-radius: 10px; font-size: 1.1rem; margin-bottom: 30px; cursor: pointer; }
        .back-nav { cursor: pointer; color: var(--neon); margin-bottom: 20px; display: inline-block; font-weight: bold; }

        footer { text-align: center; padding: 50px; border-top: 1px solid #222; font-size: 0.9rem; color: #888; }
        footer strong { color: var(--neon); }

        @media (max-width: 768px) {
            .tourist-item { flex-direction: column; }
            .tourist-item img { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="globe-bg"><div class="earth-gif"></div></div>
    <div id="india-flag-bg"></div>
    <audio id="planeSound" src="https://www.soundjay.com/transportation/sounds/airplane-take-off-1.mp3"></audio>

    <!-- 1. INTRO -->
    <div id="home-screen" class="screen">
        <h1 class="title">(GK)<span>2</span></h1>
        <p style="letter-spacing: 4px; color: var(--neon);">GEOGRAPHICAL KNOWLEDGE FOR KIDS</p>
        <div class="hologram-btn" onclick="openMenu()">
            <div class="plane-icon">✈</div>
            <span class="btn-tag">ENTER</span>
        </div>
    </div>

    <!-- 2. SELECTION -->
    <div id="selection-menu" class="screen">
        <h2 style="margin-bottom: 40px;">Choose Your Destination</h2>
        <div>
            <div class="choice-card" onclick="loadContent('india')">
                <h1 style="margin:0">🇮🇳</h1>
                <h3>India Portal</h3>
                <p>States & Districts</p>
            </div>
            <div class="choice-card" onclick="loadContent('world')">
                <h1 style="margin:0">🌍</h1>
                <h3>World Nations</h3>
                <p>50+ Countries Database</p>
            </div>
        </div>
    </div>

    <!-- 3. MAIN CONTENT -->
    <div id="main-content">
        <div class="container">
            <span class="back-nav" onclick="openMenu()">← BACK TO NAVIGATION</span>
            <div id="selector-wrapper"></div>
            <div id="content-display"></div>
            
            <footer>
                <p>Concept given by: <strong>Kumar Gaurav</strong></p>
                <p>Design & Developed by: <strong>100, 000 000 000</strong></p>
            </footer>
        </div>
    </div>

    <script>
        const sound = document.getElementById('planeSound');

        const db = {
            india: {
                name: "India (Bharat)", capital: "New Delhi", continent: "Asia", pm: "Narendra Modi", president: "Droupadi Murmu", animal: "Royal Bengal Tiger", bird: "Indian Peacock",
                flag: "https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/320px-Flag_of_India.svg.png",
                map: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/India_map_en.svg/600px-India_map_en.svg.png",
                pos: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/India_on_the_globe_%28India_centered%29.svg/400px-India_on_the_globe_%28India_centered%29.svg.png",
                famous: "India is globally celebrated for its immense cultural diversity, being the birthplace of Yoga, and the world's largest democracy. It is famous for its 5,000-year-old heritage, the majestic Himalayan ranges, and its world-leading software and space industries. From the vibrant spices of the south to the spiritual ghats of the north, India is a land where ancient traditions meet modern technology.",
                provinces: "28 States and 8 Union Territories including Maharashtra, Kerala, and Rajasthan.",
                districts: "Over 780 Districts including Kutch (Largest), Thane (Most Populous), and Leh.",
                tourist: [
                    { name: "The Taj Mahal, Agra", img: "https://images.unsplash.com/photo-1564507592333-c60657451dd7?w=400&h=300&fit=crop", gist: "This ivory-white marble mausoleum is one of the Seven Wonders of the World and a symbol of eternal love. Built by Mughal Emperor Shah Jahan, it is world-famous for its perfect symmetry and intricate gemstone carvings. It stands on the banks of the Yamuna river and attracts millions of global tourists every year." },
                    { name: "Golden Temple, Amritsar", img: "https://images.unsplash.com/photo-1514222134-b57cbb8ce073?w=400&h=300&fit=crop", gist: "Known as Sri Harmandir Sahib, it is the holiest shrine in Sikhism and famous for its stunning gold-covered exterior. The temple is surrounded by a large man-made pool and is known for its community kitchen (Langar) that serves free food to thousands daily. It represents equality and spiritual peace for people of all religions." },
                    { name: "Hawa Mahal, Jaipur", img: "https://images.unsplash.com/photo-1599661046289-e31897846e41?w=400&h=300&fit=crop", gist: "The 'Palace of Winds' is a unique five-story pink sandstone structure with 953 small windows called Jharokhas. It was built in 1799 to allow royal women to observe street festivals without being seen from the outside. Its beehive-like architecture is designed to keep the palace cool even during the hot Rajasthan summers." },
                    { name: "Varanasi Ghats", img: "https://images.unsplash.com/photo-1561361513-2d000a50f0dc?w=400&h=300&fit=crop", gist: "Varanasi is one of the oldest living cities in the world and the spiritual heart of Hindu culture. The stone steps or 'ghats' leading to the river Ganges are famous for daily religious rituals and the beautiful evening Ganga Aarti ceremony. It is a place of deep spiritual significance and a unique glimpse into ancient Indian traditions." },
                    { name: "Backwaters of Kerala", img: "https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?w=400&h=300&fit=crop", gist: "The Kerala backwaters are a network of tranquil canals, rivers, and lakes parallel to the Arabian Sea coast. Tourists stay in traditional wooden houseboats called 'Kettuvallams' to enjoy the lush greenery and peaceful water life. It is often called 'God's Own Country' because of its breathtaking natural beauty and serene environment." }
                ]
            },
            usa: {
                name: "United States of America", capital: "Washington D.C.", continent: "North America", pm: "N/A", president: "Joe Biden", animal: "American Bison", bird: "Bald Eagle",
                flag: "https://upload.wikimedia.org/wikipedia/en/thumb/a/a4/Flag_of_the_United_States.svg/320px-Flag_of_the_United_States.svg.png",
                map: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/USA_Location_Map.svg/600px-USA_Location_Map.svg.png",
                pos: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/USA_Location_Map.svg/400px-USA_Location_Map.svg.png",
                famous: "The USA is a global superpower famous for its leadership in technology, economics, and entertainment through Hollywood and Silicon Valley. It is known for its vast geographic diversity, featuring everything from the snowy peaks of Alaska to the tropical beaches of Florida. The country is a melting pot of cultures and a pioneer in democratic values and space exploration.",
                tourist: [
                    { name: "Statue of Liberty", img: "https://images.unsplash.com/photo-1605130284535-11dd9eedc58a?w=400&h=300&fit=crop", gist: "A gift from France, this copper statue stands on Liberty Island in New York Harbor as a universal symbol of freedom. It has welcomed millions of immigrants for over a century and represents the American dream of opportunity. Visitors can climb to the crown for a spectacular panoramic view of the Manhattan skyline." },
                    { name: "Grand Canyon", img: "https://images.unsplash.com/photo-1474044159687-1ee9f3a51722?w=400&h=300&fit=crop", gist: "This massive canyon carved by the Colorado River in Arizona is one of the world's most spectacular natural wonders. Its layered bands of red rock reveal millions of years of geological history and provide breathtaking vistas. It is a popular spot for hiking, rafting, and witnessing some of the most beautiful sunsets on Earth." },
                    { name: "White House", img: "https://images.unsplash.com/photo-1574867490050-80a9968430e7?w=400&h=300&fit=crop", gist: "Located at 1600 Pennsylvania Avenue, the White House is the official residence and workplace of the President of the United States. It is a symbol of American political power and a historic monument that has housed almost every president since John Adams. It is one of the most recognizable buildings in the world and a key site for global diplomacy." },
                    { name: "Disney World, Florida", img: "https://images.unsplash.com/photo-1502444330042-d1a1ddf9bb5c?w=400&h=300&fit=crop", gist: "The world's most visited entertainment resort, Disney World is famous for its magical theme parks, luxury hotels, and iconic Cinderella Castle. It offers a unique world of fantasy for kids and adults alike, featuring characters from classic Disney and Marvel movies. It is a massive complex that operates like its own self-contained city." },
                    { name: "Golden Gate Bridge", img: "https://images.unsplash.com/photo-1449034446853-66c86144b0ad?w=400&h=300&fit=crop", gist: "Spanning the San Francisco Bay, this orange-colored suspension bridge is an engineering marvel and the most photographed bridge in the world. It is famous for its Art Deco styling and the way its towers disappear into the thick Pacific fog. It serves as the iconic gateway to the city of San Francisco and Northern California." }
                ]
            }
        };

        // Populate 48 more basic entries for the list
        const countryList = ["Afghanistan", "Australia", "Brazil", "Canada", "China", "Egypt", "France", "Germany", "Italy", "Japan", "Mexico", "Russia", "South Africa", "United Kingdom", "Argentina", "Saudi Arabia", "Turkey", "South Korea", "Spain", "Indonesia", "Nigeria", "Thailand", "Vietnam", "Pakistan", "Iran", "Iraq", "Israel", "Norway", "Sweden", "Switzerland", "Greece", "Portugal", "Singapore", "Malaysia", "New Zealand", "Netherlands", "Belgium", "Denmark", "Finland", "Poland", "Ukraine", "Ireland", "Chile", "Peru", "Colombia", "Kenya", "Ethiopia", "UAE"];

        function openMenu() {
            sound.play();
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('selection-menu').style.display = 'flex';
            document.getElementById('globe-bg').style.display = 'block';
            document.getElementById('india-flag-bg').style.display = 'none';
        }

        function loadContent(mode) {
            document.getElementById('selection-menu').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            const selector = document.getElementById('selector-wrapper');
            const display = document.getElementById('content-display');

            if(mode === 'india') {
                document.getElementById('globe-bg').style.display = 'none';
                document.getElementById('india-flag-bg').style.display = 'block';
                selector.innerHTML = "";
                render(db.india, true);
            } else {
                let opts = `<option value="">-- Choose a Nation (50 available) --</option>`;
                opts += Object.keys(db).filter(k=>k!='india').map(k=>`<option value="${k}">${db[k].name}</option>`).join('');
                countryList.forEach(c => opts += `<option value="gen">${c}</option>`);
                selector.innerHTML = `<select onchange="handleSelect(this.value, this.options[this.selectedIndex].text)">${opts}</select>`;
                display.innerHTML = `<div class="card" style="text-align:center"><h3>Explore the world from the menu above!</h3></div>`;
            }
        }

        function handleSelect(val, name) {
            if(val === 'gen') {
                document.getElementById('content-display').innerHTML = `<div class="card"><h3>${name}</h3><p>Full educational details for ${name} are being added to the database. Currently showing basic profile.</p></div>`;
            } else if(val) render(db[val], false);
        }

        function render(data, isIndia) {
            const display = document.getElementById('content-display');
            let tHtml = data.tourist.map(t => `
                <div class="tourist-item">
                    <img src="${t.img}" alt="${t.name}">
                    <div class="tourist-info">
                        <h4>${t.name}</h4>
                        <p>${t.gist}</p>
                    </div>
                </div>
            `).join('');

            display.innerHTML = `
                <div class="card">
                    <div class="header-section">
                        <img src="${data.flag}" class="flag-small">
                        <h1 style="margin:0">${data.name}</h1>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><small>Capital</small>${data.capital}</div>
                        <div class="stat-box"><small>Continent</small>${data.continent}</div>
                        <div class="stat-box"><small>PM</small>${data.pm}</div>
                        <div class="stat-box"><small>President</small>${data.president}</div>
                        <div class="stat-box"><small>National Animal</small>${data.animal}</div>
                        <div class="stat-box"><small>National Bird</small>${data.bird}</div>
                    </div>
                    <h3>Geographical Maps</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div><small>Political Map Photograph</small><img src="${data.map}" class="map-img"></div>
                        <div><small>Position in World Map</small><img src="${data.pos}" class="map-img" style="background:white; padding:10px;"></div>
                    </div>
                </div>

                <div class="card">
                    <h3>Famous For</h3>
                    <p style="line-height:1.6; font-size:1.1rem; color:#eee;">${data.famous}</p>
                </div>

                ${isIndia ? `
                <div class="card">
                    <h3>Administration</h3>
                    <p><b>Provinces:</b> ${data.provinces}</p>
                    <p><b>Districts:</b> ${data.districts}</p>
                </div>` : ''}

                <div class="card">
                    <h3>Top 5 Tourist Destinations</h3>
                    <div class="tourist-list">${tHtml}</div>
                </div>
            `;
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
