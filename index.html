<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>(GK)²: Geographical Knowledge for Kids</title>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* BACKGROUNDS */
        #globe-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #001d3d, #000); }
        .earth-gif { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70vh; height: 70vh; background: url('https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif') center/cover; border-radius: 50%; box-shadow: 0 0 50px var(--neon); opacity: 0.3; }
        #india-flag-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.25; background: url('https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/1200px-Flag_of_India.svg.png') center/cover; }

        /* SCREENS */
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        h1.title { font-size: 5rem; margin: 0; text-shadow: 0 0 20px var(--neon); }
        h1 span { font-size: 2rem; vertical-align: super; }
        
        .hologram-btn { margin-top: 30px; cursor: pointer; transition: 0.3s; animation: hoverPlane 3s infinite ease-in-out; }
        .plane-icon { font-size: 90px; color: var(--neon); filter: drop-shadow(0 0 15px var(--neon)); transform: rotate(-45deg); }
        .btn-tag { display: block; border: 2px solid var(--neon); padding: 10px 30px; border-radius: 30px; margin-top: 15px; font-weight: bold; letter-spacing: 3px; background: rgba(0, 242, 255, 0.1); }
        @keyframes hoverPlane { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        #selection-menu, #main-content { display: none; }
        .choice-card { display: inline-block; width: 260px; padding: 40px; margin: 15px; background: var(--glass); border: 1px solid var(--neon); border-radius: 20px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; }
        .choice-card:hover { transform: translateY(-10px); background: rgba(0, 242, 255, 0.3); }

        /* CONTENT */
        .container { max-width: 950px; margin: 0 auto; text-align: left; padding: 40px 15px; }
        .card { background: var(--glass); backdrop-filter: blur(25px); border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        
        .header-section { display: flex; align-items: center; gap: 25px; margin-bottom: 25px; }
        .flag-small { width: 100px; border: 2px solid #fff; border-radius: 5px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border-bottom: 3px solid var(--neon); }
        .stat-box small { color: var(--neon); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }

        .tourist-item { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tourist-item img { width: 220px; height: 140px; object-fit: cover; border-radius: 10px; border: 1px solid var(--neon); flex-shrink: 0; }
        .tourist-info h4 { margin: 0 0 8px 0; color: var(--neon); }
        .tourist-info p { margin: 0; font-size: 0.9rem; line-height: 1.5; color: #eee; }

        select { width: 100%; padding: 15px; background: #111; color: #fff; border: 1px solid var(--neon); border-radius: 10px; font-size: 1.1rem; margin-bottom: 30px; cursor: pointer; }
        .back-nav { cursor: pointer; color: var(--neon); margin-bottom: 20px; display: inline-block; font-weight: bold; }

        footer { text-align: center; padding: 50px; border-top: 1px solid #222; font-size: 0.9rem; color: #888; }
        footer strong { color: var(--neon); }

        @media (max-width: 768px) { .tourist-item { flex-direction: column; } .tourist-item img { width: 100%; height: 180px; } }
    </style>
</head>

        function openMenu() {
            sound.play();
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('selection-menu').style.display = 'flex';
            document.getElementById('globe-bg').style.display = 'block';
            document.getElementById('india-flag-bg').style.display = 'none';
        }

        function loadContent(mode) {
            document.getElementById('selection-menu').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            const selector = document.getElementById('selector-wrapper');
            const display = document.getElementById('content-display');

            if(mode === 'india') {
                document.getElementById('globe-bg').style.display = 'none';
                document.getElementById('india-flag-bg').style.display = 'block';
                selector.innerHTML = "";
                render(db.india, true);
            } else {
                let opts = `<option value="">-- All Countries (1-30) --</option>`;
                opts += Object.keys(db).filter(k=>k!='india').map(k=>`<option value="${k}">${db[k].name}</option>`).join('');
                selector.innerHTML = `<select onchange="handleSelect(this.value)">${opts}</select>`;
                display.innerHTML = `<div class="card" style="text-align:center"><h3>Select a country to explore!</h3></div>`;
            }
        }

        function handleSelect(val) { if(val) render(db[val], false); }

        function render(data, isIndia) {
            const display = document.getElementById('content-display');
            let tHtml = data.tourist.map(t => `
                <div class="tourist-item">
                    <img src="${t.img}" alt="${t.name}">
                    <div class="tourist-info">
                        <h4>${t.name}</h4>
                        <p>${t.gist}</p>
                    </div>
                </div>
            `).join('');

            display.innerHTML = `
                <div class="card">
                    <div class="header-section">
                        <img src="${data.flag}" class="flag-small">
                        <h1 style="margin:0">${data.name}</h1>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><small>Capital</small>${data.capital}</div>
                        <div class="stat-box"><small>Continent</small>${data.continent}</div>
                        <div class="stat-box"><small>Prime Minister</small>${data.pm}</div>
                        <div class="stat-box"><small>President</small>${data.president}</div>
                        <div class="stat-box"><small>National Animal</small>${data.animal}</div>
                        <div class="stat-box"><small>National Bird</small>${data.bird}</div>
                    </div>
                </div>

                <div class="card">
                    <h3>Famous For</h3>
                    <p style="line-height:1.6; font-size:1.1rem; color:#eee;">${data.famous}</p>
                </div>

                ${isIndia ? `
                <div class="card">
                    <h3>Administration</h3>
                    <p><b>Provinces (States):</b> ${data.provinces}</p>
                    <p><b>Districts:</b> ${data.districts}</p>
                </div>` : ''}

                <div class="card">
                    <h3>Top 5 Famous Tourist Places</h3>
                    <div class="tourist-list">${tHtml}</div>
                </div>
            `;
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
