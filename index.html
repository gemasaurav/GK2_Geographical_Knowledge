<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(GK)²: Geographical Knowledge for Kids</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #ff0055;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; color: white;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        /* 1. BACKGROUNDS */
        #globe-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #001d3d 0%, #000 100%);
        }
        .globe {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 700px; height: 700px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif');
            background-size: cover; border-radius: 50%;
            box-shadow: inset 0 0 80px #000, 0 0 40px rgba(0, 242, 255, 0.4);
            opacity: 0.5;
        }

        #india-flag-bg {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.25;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/1200px-Flag_of_India.svg.png');
            background-size: cover; background-position: center;
        }

        /* 2. INTRO SCREEN */
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        
        h1.title { font-size: 6rem; margin: 0; text-shadow: 0 0 30px var(--neon-blue); }
        h1.title span { font-size: 3rem; vertical-align: super; }

        .hologram-btn {
            margin-top: 40px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 3s ease-in-out infinite;
        }
        .hologram-btn:hover { transform: scale(1.1); filter: brightness(1.3); }
        .plane-icon { font-size: 110px; color: var(--neon-blue); filter: drop-shadow(0 0 20px var(--neon-blue)); }
        .btn-label { display: block; border: 2px solid var(--neon-blue); padding: 12px 35px; border-radius: 40px; margin-top: 15px; font-weight: bold; letter-spacing: 5px; background: rgba(0, 242, 255, 0.15); box-shadow: 0 0 15px var(--neon-blue); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 3. APP NAVIGATION & SECTIONS */
        #selection-menu { display: none; padding: 50px; text-align: center; }
        .choice-card { 
            display: inline-block; width: 300px; padding: 40px; margin: 20px; 
            background: var(--glass); border-radius: 20px; border: 1px solid var(--neon-blue);
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .choice-card:hover { transform: translateY(-10px); background: rgba(0, 242, 255, 0.2); }

        #main-content { display: none; padding: 40px 10px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 25px; padding: 35px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1); }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 25px 0; }
        .info-item { background: rgba(0,0,0,0.4); padding: 18px; border-radius: 12px; border-left: 4px solid var(--neon-blue); }
        .info-item strong { color: var(--neon-blue); display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }

        .image-frame { width: 100%; border-radius: 15px; overflow: hidden; margin: 20px 0; border: 2px solid rgba(255,255,255,0.2); }
        .image-frame img { width: 100%; height: auto; display: block; transition: 0.5s; }
        .image-frame:hover img { transform: scale(1.05); }

        .country-selector {
            width: 100%; padding: 15px; background: #111; color: white; border: 1px solid var(--neon-blue);
            border-radius: 10px; font-size: 1.1rem; margin-bottom: 30px;
        }

        .back-nav { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .nav-btn { background: none; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* 4. FOOTER */
        footer { 
            text-align: center; padding: 60px 20px; margin-top: 100px; 
            border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; color: #888;
        }
        footer strong { color: var(--neon-blue); }
    </style>
</head>
<body>

    <!-- PERSISTENT BACKGROUNDS -->
    <div id="globe-container"><div class="globe"></div></div>
    <div id="india-flag-bg"></div>

    <!-- SOUND -->
    <audio id="planeSound" src="https://www.soundjay.com/transportation/sounds/airplane-take-off-1.mp3"></audio>

    <!-- INTRO SCREEN -->
    <div id="intro-screen" class="screen">
        <h1 class="title">(GK)<span>2</span></h1>
        <p style="letter-spacing: 6px; color: #00f2ff; margin-top: 10px;">GEOGRAPHICAL KNOWLEDGE FOR KIDS</p>

        <div class="hologram-btn" onclick="goToMenu()">
            <div class="plane-icon">✈</div>
            <span class="btn-label">ENTER EXPLORER</span>
        </div>
    </div>

    <!-- SELECTION MENU -->
    <div id="selection-menu" class="screen">
        <h2 style="font-size: 2.5rem; margin-bottom: 40px;">Choose Your Destination</h2>
        <div class="choice-card" onclick="showSection('india')">
            <h1 style="font-size: 4rem;">🇮🇳</h1>
            <h3>Incredible India</h3>
            <p>Deep dive into Districts & States</p>
        </div>
        <div class="choice-card" onclick="showSection('world')">
            <h1 style="font-size: 4rem;">🌍</h1>
            <h3>World Explorer</h3>
            <p>Discover countries across all Continents</p>
        </div>
    </div>

    <!-- MAIN CONTENT SECTION -->
    <div id="main-content">
        <div class="back-nav">
            <button class="nav-btn" onclick="goToMenu()">← Change Mode</button>
            <span id="section-title" style="color: var(--neon-blue); font-weight: bold; letter-spacing: 2px;"></span>
        </div>

        <div id="explorer-view">
            <!-- Dynamic Content Appears Here -->
        </div>

        <footer>
            <p>Concept given by: <strong>Kumar Gaurav</strong></p>
            <p>Design & Developed by: <strong>100, 000 000 000</strong></p>
        </footer>
    </div>

    <script>
        const database = {
            india: {
                name: "India",
                flag: "🇮🇳",
                continent: "Asia",
                pm: "Narendra Modi",
                president: "Droupadi Murmu",
                animal: "Royal Bengal Tiger",
                bird: "Indian Peacock",
                famous: "India is world-renowned for its incredible cultural diversity, spiritual heritage, and being the largest democracy on Earth. It is famous for the majestic Himalayan mountain range, its vibrant 5,000-year-old history, and globally loved spices and cuisine. From the invention of zero and Yoga to being a global IT superpower, India beautifully blends ancient traditions with futuristic space technology.",
                worldMap: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/India_Location_Map.svg/1000px-India_Location_Map.svg.png",
                provinces: "28 States & 8 Union Territories (e.g., Maharashtra, Uttar Pradesh, Kerala, Rajasthan)",
                districts: "785+ Administrative Districts (Including Kutch, Leh, Mumbai, Ahmedabad, and Mysore)",
                tourist: [
                    {
                        name: "The Taj Mahal, Agra",
                        img: "https://images.unsplash.com/photo-1564507592333-c60657451dd7?auto=format&fit=crop&w=1200&q=80",
                        gist: "Commissioned in 1632 by the Mughal emperor Shah Jahan, this ivory-white marble mausoleum is a universal symbol of eternal love. It is one of the Seven Wonders of the World and represents the peak of Mughal architecture, blending Indian, Persian, and Islamic styles. The structure is famous for its perfect symmetry, intricate marble carvings, and the way it glows differently under morning and moonlight."
                    },
                    {
                        name: "Varanasi Ghats, Uttar Pradesh",
                        img: "https://images.unsplash.com/photo-1561361513-2d000a50f0dc?auto=format&fit=crop&w=1200&q=80",
                        gist: "Varanasi is one of the oldest continuously inhabited cities in the world and serves as the spiritual heart of India. Located on the banks of the Holy Ganges, it is famous for its 84 stone steps or 'ghats' where centuries-old religious rituals are performed daily. The evening Ganga Aarti, with its rhythmic chants and fire lamps, offers a mesmerizing glimpse into India's deep spiritual and cultural roots."
                    }
                ]
            },
            world: {
                "USA": {
                    flag: "🇺🇸", continent: "North America", pm: "N/A", president: "Donald Trump (Incumbent)", animal: "American Bison", bird: "Bald Eagle",
                    famous: "The United States is famous for being the world's leading economic and military superpower and the birthplace of Hollywood and Silicon Valley. It is known for its vast geographic diversity, ranging from the Grand Canyon to New York's skyscrapers, and its significant cultural influence in music, movies, and sports. USA is a global leader in innovation, aerospace exploration, and democratic ideals that have shaped modern history.",
                    worldMap: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/USA_Location_Map.svg/1000px-USA_Location_Map.svg.png",
                    tourist: [{
                        name: "Statue of Liberty, New York", img: "https://images.unsplash.com/photo-1605130284535-11dd9eedc58a?auto=format&fit=crop&w=1200&q=80",
                        gist: "A gift of friendship from the people of France, this massive copper statue stands on Liberty Island as a universal symbol of freedom and democracy. It has welcomed millions of immigrants to American shores for over a century and is one of the most recognizable landmarks in the world. Visitors can climb to the crown for a panoramic view of the New York Harbor and the iconic Manhattan skyline."
                    }]
                },
                "Japan": {
                    flag: "🇯🇵", continent: "Asia", pm: "Sanae Takaichi (Incumbent)", president: "Emperor Naruhito", animal: "Japanese Macaque", bird: "Green Pheasant",
                    famous: "Japan is celebrated as the 'Land of the Rising Sun,' famous for its unique blend of ancient Samurai traditions and high-tech futuristic cities. It is the global leader in robotics, automotive engineering, and the influential world of Anime and Manga. Japan is also renowned for its breathtaking cherry blossoms, disciplined culture, and world-class culinary heritage including Sushi, Ramen, and Wagyu beef.",
                    worldMap: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Japan_on_the_globe_%28Japan_centered%29.svg/800px-Japan_on_the_globe_%28Japan_centered%29.svg.png",
                    tourist: [{
                        name: "Mount Fuji", img: "https://images.unsplash.com/photo-1570690516157-a2d712740b7e?auto=format&fit=crop&w=1200&q=80",
                        gist: "Mount Fuji is Japan's highest peak and an active stratovolcano that has long been a sacred site for pilgrimage and a source of artistic inspiration. Its near-perfect snow-capped cone is a national symbol of Japan and a UNESCO World Heritage site that attracts thousands of climbers every summer. Surrounded by five beautiful lakes, the mountain offers some of the most serene and photogenic landscapes in East Asia."
                    }]
                },
                "France": {
                    flag: "🇫🇷", continent: "Europe", pm: "Michel Barnier", president: "Emmanuel Macron", animal: "Gallic Rooster", bird: "N/A",
                    famous: "France is internationally famous as the world's most visited country and the global capital of fashion, perfume, and fine arts. It is the birthplace of the Enlightenment, boasting a rich history of revolution that shaped modern democratic values and Western law. From the lavender fields of Provence to its world-class wineries and Michelin-starred cuisine, France remains a beacon of elegance, romance, and culture.",
                    worldMap: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/France_Location_Map.svg/1000px-France_Location_Map.svg.png",
                    tourist: [{
                        name: "Eiffel Tower, Paris", img: "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=1200&q=80",
                        gist: "Originally built for the 1889 World's Fair, the Eiffel Tower is a wrought-iron masterpiece that has become the definitive symbol of Paris and romance. Standing over 300 meters tall, it was once the tallest man-made structure in the world and offers stunning 360-degree views of the city. Every night, the tower is illuminated by thousands of sparkling lights, creating a magical atmosphere in the heart of the city."
                    }]
                }
            }
        };

        function playSound() {
            const sound = document.getElementById('planeSound');
            sound.volume = 0.4;
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Audio needs user interaction first."));
        }

        function goToMenu() {
            playSound();
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('selection-menu').style.display = 'flex';
            document.getElementById('globe-container').style.display = 'block';
            document.getElementById('india-flag-bg').style.display = 'none';
            window.scrollTo(0, 0);
        }

        function showSection(mode) {
            playSound();
            document.getElementById('selection-menu').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            if(mode === 'india') {
                document.getElementById('globe-container').style.display = 'none';
                document.getElementById('india-flag-bg').style.display = 'block';
                document.getElementById('section-title').innerText = "INCREDIBLE INDIA";
                renderCountry(database.india, true);
            } else {
                document.getElementById('globe-container').style.display = 'block';
                document.getElementById('india-flag-bg').style.display = 'none';
                document.getElementById('section-title').innerText = "WORLD EXPLORER";
                renderWorldPicker();
            }
            window.scrollTo(0, 0);
        }

        function renderWorldPicker() {
            const container = document.getElementById('explorer-view');
            let html = `
                <select class="country-selector" onchange="loadWorldCountry(this.value)">
                    <option value="">Select a Country to Explore...</option>
                    ${Object.keys(database.world).map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
                <div id="world-details-container">
                    <div class="card" style="text-align:center; padding: 100px 20px;">
                        <h2 style="color:#666;">Choose a country from the list above to see details!</h2>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function loadWorldCountry(name) {
            if(!name) return;
            const country = database.world[name];
            renderCountry(country, false, 'world-details-container');
        }

        function renderCountry(data, isIndia, containerId = 'explorer-view') {
            const container = document.getElementById(containerId);
            let touristHtml = data.tourist.map(t => `
                <div style="margin-top:30px;">
                    <h4 style="color:var(--neon-blue); font-size:1.3rem;">${t.name}</h4>
                    <p style="line-height:1.7;">${t.gist}</p>
                    <div class="image-frame"><img src="${t.img}" alt="${t.name}"></div>
                </div>
            `).join('<hr style="opacity:0.1; margin:40px 0;">');

            let html = `
                <div class="card">
                    <h1 style="font-size: 3.5rem; margin:0;">${data.flag} ${data.name || ''}</h1>
                    <div class="info-grid">
                        <div class="info-item"><strong>Continent</strong>${data.continent}</div>
                        <div class="info-item"><strong>Prime Minister</strong>${data.pm}</div>
                        <div class="info-item"><strong>President</strong>${data.president}</div>
                        <div class="info-item"><strong>National Animal</strong>${data.animal}</div>
                        <div class="info-item"><strong>National Bird</strong>${data.bird}</div>
                    </div>
                    
                    <h3>World Position Map</h3>
                    <div class="image-frame" style="background:#fff;"><img src="${data.worldMap}" alt="Map"></div>
                </div>

                <div class="card">
                    <h3>Famous For</h3>
                    <p style="line-height:1.7; font-size:1.1rem;">${data.famous}</p>
                </div>

                ${isIndia ? `
                <div class="card">
                    <h3>Administrative Structure</h3>
                    <div class="info-item" style="margin-bottom:15px;"><strong>Provinces (States)</strong>${data.provinces}</div>
                    <div class="info-item"><strong>Districts</strong>${data.districts}</div>
                </div>` : ''}

                <div class="card">
                    <h3>Top Tourist Destinations</h3>
                    ${touristHtml}
                </div>
            `;
            container.innerHTML = (containerId === 'world-details-container') ? html : html;
            if(containerId === 'explorer-view' && !isIndia) renderWorldPicker(); // Keep picker for world
        }
    </script>
</body>
</html>
